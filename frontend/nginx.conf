# =============================================================================
# nginx.conf — Nginx configuration for serving the Angular SPA in production
#
# WHY Nginx?
#   Angular produces static files (HTML, JS, CSS) after `ng build`. Nginx is
#   a battle-tested, high-performance web server that serves those files much
#   more efficiently than Node.js could. Node handles the API; Nginx handles
#   the static assets.
#
# HOW routing works in production (Kubernetes):
#   Browser → AWS ALB Ingress
#     /api/*  → backend-service:3000  (Express handles it)
#     /*      → frontend-service:80   (THIS Nginx serves the Angular app)
#   Nginx never sees /api/* traffic — the Ingress routes it before it arrives.
# =============================================================================

# Run as the default 'nginx' user (non-root by default in the official image).
# The 'auto' directive sets worker_processes to the number of CPU cores,
# which is optimal for CPU-bound workloads like TLS termination and compression.
worker_processes auto;

events {
  # Maximum simultaneous connections per worker process.
  # 1024 is a safe default; increase for very high-traffic deployments.
  worker_connections 1024;
}

http {
  # mime.types maps file extensions to Content-Type headers so browsers know
  # how to handle .js, .css, .woff2, etc. Without this, everything would be
  # served as text/plain and scripts/styles would silently stop working.
  include /etc/nginx/mime.types;

  # Fallback MIME type for files not found in mime.types.
  default_type application/octet-stream;

  # sendfile lets the OS kernel transfer file data directly from disk to
  # the socket without copying it through user-space buffers. Much faster
  # for serving static files.
  sendfile on;

  # tcp_nopush batches small TCP packets together before sending.
  # Combined with sendfile, this reduces the number of network round-trips
  # when serving large files like JS bundles.
  tcp_nopush on;

  # Keep idle connections alive for 65 seconds. This avoids the overhead of
  # a TCP handshake for every single asset request (Angular apps load many).
  keepalive_timeout 65;

  # ── Gzip Compression ───────────────────────────────────────────────────────
  # Gzip compresses responses before sending them to the browser. A typical
  # Angular main bundle (500 KB) compresses to ~150 KB, cutting load time by 70%.
  gzip on;

  # Only compress responses >= 1 KB. Compressing tiny files wastes CPU.
  gzip_min_length 1024;

  # Compress these MIME types. text/html is always compressed by default.
  gzip_types
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  server {
    # Listen on port 80 (HTTP). In production the ALB terminates HTTPS and
    # forwards plain HTTP to this container — so the pod only needs port 80.
    listen 80;

    # The directory where Angular's compiled output is placed during the
    # Docker build (`ng build` writes to /usr/share/nginx/html).
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    # These headers instruct browsers to apply security policies that reduce
    # the impact of XSS, clickjacking, and information leakage attacks.

    # X-Frame-Options: prevents this page from being embedded in <iframe>
    # on other domains, blocking clickjacking attacks.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options: stops browsers from guessing (sniffing) the
    # MIME type. Without this a browser might execute a .jpg as JavaScript.
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer-Policy: controls how much of the current URL is sent in the
    # Referer header to third-party sites. 'strict-origin-when-cross-origin'
    # sends only the origin for cross-origin requests, protecting path/query info.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── SPA (Single-Page Application) Routing ────────────────────────────────
    # Angular handles routing client-side with the HTML5 History API (e.g.
    # /products/123). When a user refreshes or opens a deep link directly,
    # the browser asks Nginx for /products/123. That file doesn't exist on disk,
    # so without this rule Nginx would return 404.
    #
    # try_files checks:
    #   1. $uri       — does this exact file exist? (e.g. /main.abc123.js)
    #   2. $uri/      — is this a directory?
    #   3. /index.html — fall back to the Angular shell, which loads the router
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── Aggressive caching for hashed assets ─────────────────────────────────
    # Angular's production build appends a content hash to every JS/CSS file
    # name (e.g. main.3f2a9b.js). When the code changes, the hash changes,
    # so the old cached file is never stale. We can therefore cache these files
    # indefinitely (1 year) with 'immutable' to skip revalidation requests.
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";

      # Allow gzip pre-compressed files (.gz) to be served directly if they
      # exist alongside the originals — saves CPU on repeated requests.
      gzip_static on;
    }

    # ── index.html must NOT be cached ─────────────────────────────────────────
    # index.html references the hashed asset filenames. If a browser caches
    # index.html, it will keep loading OLD asset names even after a deployment.
    # no-store forces the browser to always fetch a fresh copy.
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Custom 404 ────────────────────────────────────────────────────────────
    # If a real asset (e.g. /favicon.ico) is not found, return 404.
    # The try_files in the '/' block already handles SPA routes — this
    # error_page only fires if $uri doesn't exist AND isn't an SPA route.
    error_page 404 /index.html;
  }
}

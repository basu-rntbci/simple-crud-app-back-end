# =============================================================================
# backend-secrets.template.yaml — Kubernetes Secret TEMPLATE (safe to commit)
#
# THIS FILE IS A TEMPLATE — it contains PLACEHOLDER values, not real secrets.
# The CI/CD workflows create the actual Secret from GitHub Secrets at deploy time.
#
# WHY Kubernetes Secrets (not ConfigMap)?
#   Kubernetes Secrets store values base64-encoded and (when configured) encrypted
#   at rest in etcd. They can be referenced in Pod specs without embedding the
#   actual value in the YAML — the value stays in the cluster control plane.
#
# HOW TO CREATE THE REAL SECRET (manual / for local k8s testing):
#   kubectl create secret generic backend-secrets \
#     --namespace=<env> \
#     --from-literal=MONGO_URI='mongodb+srv://...' \
#     --from-literal=JWT_SECRET='your-random-secret' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# WHY --dry-run=client | kubectl apply?
#   This is the idempotent pattern: if the secret already exists it is updated;
#   if it doesn't it is created. A plain `kubectl create` would error on re-run.
#
# THE CI/CD APPROACH (what the GitHub Actions workflows actually do):
#   The cd-staging.yml and cd-prod.yml workflows run the kubectl create command
#   above, but read the values from GitHub Secrets instead of hardcoding them.
#   This means secret values NEVER appear in workflow logs or version control.
#
# NEVER COMMIT A VERSION OF THIS FILE WITH REAL VALUES.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  # This name must match the secretRef.name in k8s/base/backend/deployment.yaml
  name: backend-secrets
  # namespace is filled in by the overlay / CI pipeline, not here.
type: Opaque
stringData:
  # stringData accepts plain text — Kubernetes base64-encodes it automatically.
  # Using stringData (not data) avoids manual base64 encoding mistakes.
  MONGO_URI: "REPLACE_WITH_REAL_MONGO_URI"
  JWT_SECRET: "REPLACE_WITH_REAL_JWT_SECRET"
